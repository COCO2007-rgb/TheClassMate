name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd parent_portal
          npm install

      - name: Build web assets
        run: |
          cd parent_portal
          npm run build

      - name: Sync with Capacitor
        run: |
          cd parent_portal
          npx cap sync android > capacitor-sync.log 2>&1 || (cat capacitor-sync.log && exit 1)

      - name: Build Android Debug APK
        run: |
          cd parent_portal/android
          chmod +x gradlew
          ./gradlew assembleDebug > ../gradle-build.log 2>&1 || (cat ../gradle-build.log && exit 1)

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheClassMate-Parent-App
          path: parent_portal/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK to Public GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: Latest Parent Portal APK
          body: |
            This is the latest compiled debug APK of the Parent Portal.
            - Automatically loads updates from: https://theclassmat-parent.vercel.app
          files: parent_portal/android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push logs on failure
        if: failure()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add -f parent_portal/capacitor-sync.log || true
          git add -f parent_portal/gradle-build.log || true
          git commit -m "build failure logs" || true
          git push origin HEAD:build-logs --force
